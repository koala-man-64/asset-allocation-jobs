location: East US
name: bronze-economic-catalyst-job
type: Microsoft.App/jobs
tags:
  owner: ${RESOURCE_TAG_OWNER}
  cost-center: ${RESOURCE_TAG_COST_CENTER}
  workload: ${RESOURCE_TAG_WORKLOAD}
  environment: ${RESOURCE_TAG_ENVIRONMENT}
  job-category: data-pipeline
  job-key: economic-catalyst
  job-role: load
  trigger-owner: schedule
identity:
  type: UserAssigned
  userAssignedIdentities:
    "${ACR_PULL_IDENTITY_RESOURCE_ID}": {}
properties:
  configuration:
    triggerType: Schedule
    scheduleTriggerConfig:
      cronExpression: "*/30 * * * 1-5"
      parallelism: 1
      replicaCompletionCount: 1
    replicaRetryLimit: 0
    replicaTimeout: 1800
    registries:
    - server: assetallocationacr.azurecr.io
      identity: "${ACR_PULL_IDENTITY_RESOURCE_ID}"
    secrets:
    - name: azure-storage-connection-string
      value: ${AZURE_STORAGE_CONNECTION_STRING}
    - name: pg-dsn
      value: ${POSTGRES_DSN}
    - name: fred-api-key
      value: ${FRED_API_KEY}
    - name: nasdaq-api-key
      value: ${NASDAQ_API_KEY}
    - name: massive-api-key
      value: ${MASSIVE_API_KEY}
    - name: alpha-vantage-api-key
      value: ${ALPHA_VANTAGE_API_KEY}
    - name: alpaca-key-id
      value: ${ALPACA_KEY_ID}
    - name: alpaca-secret-key
      value: ${ALPACA_SECRET_KEY}
  environmentId: ${CONTAINER_APPS_ENVIRONMENT_ID}
  template:
    serviceAccountName: ${SERVICE_ACCOUNT_NAME}
    containers:
    - env:
      - name: LOG_FORMAT
        value: JSON
      - name: LOG_LEVEL
        value: INFO
      - name: DISABLE_DOTENV
        value: "true"
      - name: SYSTEM_HEALTH_ARM_SUBSCRIPTION_ID
        value: ${AZURE_SUBSCRIPTION_ID}
      - name: SYSTEM_HEALTH_ARM_RESOURCE_GROUP
        value: ${RESOURCE_GROUP}
      - name: ASSET_ALLOCATION_API_BASE_URL
        value: ${ASSET_ALLOCATION_API_BASE_URL}
      - name: ASSET_ALLOCATION_API_SCOPE
        value: ${ASSET_ALLOCATION_API_SCOPE}
      - name: JOB_STARTUP_API_CONTAINER_APPS
        value: ${JOB_STARTUP_API_CONTAINER_APPS}
      - name: TRIGGER_NEXT_JOB_NAME
        value: ${SILVER_ECONOMIC_CATALYST_JOB}
      - name: AZURE_CLIENT_ID
        value: ${ACR_PULL_IDENTITY_CLIENT_ID}
      - name: AZURE_STORAGE_ACCOUNT_NAME
        value: ${AZURE_STORAGE_ACCOUNT_NAME}
      - name: AZURE_STORAGE_CONNECTION_STRING
        secretRef: azure-storage-connection-string
      - name: AZURE_CONTAINER_BRONZE
        value: ${AZURE_CONTAINER_BRONZE}
      - name: AZURE_CONTAINER_SILVER
        value: ${AZURE_CONTAINER_SILVER}
      - name: AZURE_CONTAINER_GOLD
        value: ${AZURE_CONTAINER_GOLD}
      - name: AZURE_FOLDER_ECONOMIC_CATALYST
        value: ${AZURE_FOLDER_ECONOMIC_CATALYST}
      - name: ECONOMIC_CATALYST_OFFICIAL_SOURCES
        value: ${ECONOMIC_CATALYST_OFFICIAL_SOURCES}
      - name: ECONOMIC_CATALYST_VENDOR_SOURCES
        value: ${ECONOMIC_CATALYST_VENDOR_SOURCES}
      - name: ECONOMIC_CATALYST_STRUCTURED_CORRECTION_LOOKBACK_DAYS
        value: ${ECONOMIC_CATALYST_STRUCTURED_CORRECTION_LOOKBACK_DAYS}
      - name: ECONOMIC_CATALYST_HEADLINE_CORRECTION_LOOKBACK_DAYS
        value: ${ECONOMIC_CATALYST_HEADLINE_CORRECTION_LOOKBACK_DAYS}
      - name: ECONOMIC_CATALYST_FUTURE_SCHEDULE_DAYS
        value: ${ECONOMIC_CATALYST_FUTURE_SCHEDULE_DAYS}
      - name: ECONOMIC_CATALYST_GENERAL_POLL_MINUTES
        value: ${ECONOMIC_CATALYST_GENERAL_POLL_MINUTES}
      - name: ECONOMIC_CATALYST_ALPHA_VANTAGE_TOPICS
        value: ${ECONOMIC_CATALYST_ALPHA_VANTAGE_TOPICS}
      - name: ECONOMIC_CATALYST_FOMC_SCHEDULE_URLS
        value: ${ECONOMIC_CATALYST_FOMC_SCHEDULE_URLS}
      - name: ECONOMIC_CATALYST_BLS_ICS_URL
        value: ${ECONOMIC_CATALYST_BLS_ICS_URL}
      - name: ECONOMIC_CATALYST_BEA_SCHEDULE_URL
        value: ${ECONOMIC_CATALYST_BEA_SCHEDULE_URL}
      - name: ECONOMIC_CATALYST_ECB_CALENDAR_URL
        value: ${ECONOMIC_CATALYST_ECB_CALENDAR_URL}
      - name: ECONOMIC_CATALYST_BOE_CALENDAR_URL
        value: ${ECONOMIC_CATALYST_BOE_CALENDAR_URL}
      - name: ECONOMIC_CATALYST_BOJ_SCHEDULE_URL
        value: ${ECONOMIC_CATALYST_BOJ_SCHEDULE_URL}
      - name: ECONOMIC_CATALYST_TREASURY_AUCTIONS_URL
        value: ${ECONOMIC_CATALYST_TREASURY_AUCTIONS_URL}
      - name: ECONOMIC_CATALYST_NASDAQ_TABLES
        value: ${ECONOMIC_CATALYST_NASDAQ_TABLES}
      - name: ECONOMIC_CATALYST_HTTP_TIMEOUT_SECONDS
        value: ${ECONOMIC_CATALYST_HTTP_TIMEOUT_SECONDS}
      - name: FRED_API_KEY
        secretRef: fred-api-key
      - name: NASDAQ_API_KEY
        secretRef: nasdaq-api-key
      - name: MASSIVE_API_KEY
        secretRef: massive-api-key
      - name: ALPHA_VANTAGE_API_KEY
        secretRef: alpha-vantage-api-key
      - name: ALPACA_KEY_ID
        secretRef: alpaca-key-id
      - name: ALPACA_SECRET_KEY
        secretRef: alpaca-secret-key
      image: ${JOB_IMAGE}
      imageType: ContainerImage
      name: bronze-economic-catalyst-job
      command: ["python", "-m", "tasks.economic_catalyst_data.bronze_economic_catalyst_data"]
      resources:
        cpu: 1.5
        memory: 3Gi
  workloadProfileName: Consumption
