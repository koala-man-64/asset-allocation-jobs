location: East US
name: intraday-market-refresh-job
type: Microsoft.App/jobs
tags:
  owner: ${RESOURCE_TAG_OWNER}
  cost-center: ${RESOURCE_TAG_COST_CENTER}
  workload: ${RESOURCE_TAG_WORKLOAD}
  environment: ${RESOURCE_TAG_ENVIRONMENT}
  job-category: operational-support
  job-key: intraday-refresh
  job-role: refresh
  trigger-owner: schedule
identity:
  type: UserAssigned
  userAssignedIdentities:
    "${ACR_PULL_IDENTITY_RESOURCE_ID}": {}
properties:
  configuration:
    triggerType: Schedule
    scheduleTriggerConfig:
      cronExpression: "*/5 * * * 1-5"
      parallelism: 1
      replicaCompletionCount: 1
    replicaRetryLimit: 1
    replicaTimeout: 3600
    registries:
    - server: assetallocationacr.azurecr.io
      identity: "${ACR_PULL_IDENTITY_RESOURCE_ID}"
    secrets:
    - name: nasdaq-api-key
      value: ${NASDAQ_API_KEY}
    - name: azure-storage-connection-string
      value: ${AZURE_STORAGE_CONNECTION_STRING}
    - name: pg-dsn
      value: ${POSTGRES_DSN}
  environmentId: ${CONTAINER_APPS_ENVIRONMENT_ID}
  template:
    serviceAccountName: ${SERVICE_ACCOUNT_NAME}
    containers:
    - env:
      - name: AZURE_FOLDER_MARKET
        value: ${AZURE_FOLDER_MARKET}
      - name: AZURE_FOLDER_FINANCE
        value: ${AZURE_FOLDER_FINANCE}
      - name: AZURE_FOLDER_EARNINGS
        value: ${AZURE_FOLDER_EARNINGS}
      - name: AZURE_FOLDER_TARGETS
        value: ${AZURE_FOLDER_TARGETS}
      - name: AZURE_CONTAINER_BRONZE
        value: ${AZURE_CONTAINER_BRONZE}
      - name: AZURE_CONTAINER_SILVER
        value: ${AZURE_CONTAINER_SILVER}
      - name: AZURE_CONTAINER_GOLD
        value: ${AZURE_CONTAINER_GOLD}
      - name: AZURE_CONTAINER_COMMON
        value: ${AZURE_CONTAINER_COMMON}
      - name: LOG_FORMAT
        value: JSON
      - name: LOG_LEVEL
        value: INFO
      - name: DISABLE_DOTENV
        value: "true"
      - name: SYSTEM_HEALTH_ARM_SUBSCRIPTION_ID
        value: ${AZURE_SUBSCRIPTION_ID}
      - name: SYSTEM_HEALTH_ARM_RESOURCE_GROUP
        value: ${RESOURCE_GROUP}
      - name: JOB_STARTUP_API_CONTAINER_APPS
        value: ${JOB_STARTUP_API_CONTAINER_APPS}
      - name: AZURE_CLIENT_ID
        value: ${ACR_PULL_IDENTITY_CLIENT_ID}
      - name: AZURE_STORAGE_ACCOUNT_NAME
        value: ${AZURE_STORAGE_ACCOUNT_NAME}
      - name: AZURE_STORAGE_CONNECTION_STRING
        secretRef: azure-storage-connection-string
      - name: ASSET_ALLOCATION_API_BASE_URL
        value: ${ASSET_ALLOCATION_API_BASE_URL}
      - name: ASSET_ALLOCATION_API_SCOPE
        value: ${ASSET_ALLOCATION_API_SCOPE}
      - name: MASSIVE_TIMEOUT_SECONDS
        value: "60"
      - name: MASSIVE_MAX_WORKERS
        value: ${MASSIVE_MAX_WORKERS}
      - name: MASSIVE_FINANCE_FRESH_DAYS
        value: ${MASSIVE_FINANCE_FRESH_DAYS}
      - name: NASDAQ_API_KEY
        secretRef: nasdaq-api-key
      - name: POSTGRES_DSN
        secretRef: pg-dsn
      image: ${JOB_IMAGE}
      imageType: ContainerImage
      name: intraday-market-refresh-job
      command: ["python", "-m", "tasks.intraday_monitor.refresh_worker"]
      resources:
        cpu: 2.0
        memory: 4Gi
  workloadProfileName: Consumption
