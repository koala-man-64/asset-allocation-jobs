name: Jobs CI
run-name: Jobs CI / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: jobs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: workflow-lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

  build-test:
    name: build-test
    runs-on: ubuntu-22.04
    env:
      TEST_MODE: "1"
      LOG_FORMAT: "TEXT"
      LOG_LEVEL: "INFO"
      AZURE_STORAGE_ACCOUNT_NAME: localdev
      AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=test;AccountKey=key;EndpointSuffix=core.windows.net
      AZURE_CONTAINER_COMMON: common
      ASSET_ALLOCATION_API_BASE_URL: https://control-plane.example
      ASSET_ALLOCATION_API_SCOPE: api://asset-allocation
      POSTGRES_DSN: postgresql://user:pass@localhost:5432/asset_allocation?sslmode=disable
    steps:
      - name: Checkout jobs repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-jobs

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            asset-allocation-jobs/requirements.lock.txt
            asset-allocation-jobs/requirements-dev.lock.txt
            asset-allocation-jobs/pyproject.toml

      - name: Configure optional pip indexes
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ secrets.PYTHON_PACKAGE_INDEX_URL }}" ] || [ -n "${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}" ]; then
            cat > "${RUNNER_TEMP}/pip.conf" <<EOF
          [global]
          EOF
            if [ -n "${{ secrets.PYTHON_PACKAGE_INDEX_URL }}" ]; then
              echo "index-url = ${{ secrets.PYTHON_PACKAGE_INDEX_URL }}" >> "${RUNNER_TEMP}/pip.conf"
            fi
            if [ -n "${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}" ]; then
              echo "extra-index-url = ${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}" >> "${RUNNER_TEMP}/pip.conf"
            fi
            echo "PIP_CONFIG_FILE=${RUNNER_TEMP}/pip.conf" >> "$GITHUB_ENV"
          fi

      - name: Install test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r asset-allocation-jobs/requirements.lock.txt
          python -m pip install -r asset-allocation-jobs/requirements-dev.lock.txt
          python - <<'PY' > asset-allocation-jobs/shared-python-deps.txt
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("asset-allocation-jobs/pyproject.toml").read_text(encoding="utf-8"))
          for dependency in pyproject["project"]["dependencies"]:
              if dependency.startswith("asset-allocation-"):
                  print(dependency)
          PY
          python -m pip install -r asset-allocation-jobs/shared-python-deps.txt
          python -m pip install -e asset-allocation-jobs --no-deps
          python -m pip check

      - name: Run ruff
        shell: bash
        run: |
          set -euo pipefail
          cd asset-allocation-jobs
          python -m ruff check .

      - name: Run env-contract static tests
        shell: bash
        run: |
          set -euo pipefail
          cd asset-allocation-jobs
          python -m pytest \
            tests/test_env_contract.py \
            tests/test_workflow_runtime_ownership.py \
            tests/test_azure_provisioning_scripts.py \
            tests/test_multirepo_dependency_contract.py \
            -q

      - name: Run jobs HTTP contract tests
        shell: bash
        run: |
          set -euo pipefail
          cd asset-allocation-jobs
          python -m pytest \
            tests/core/test_control_plane_transport.py \
            tests/core/test_strategy_repository.py \
            tests/core/test_ranking_repository.py \
            tests/core/test_universe_repository.py \
            tests/core/test_regime_repository.py \
            tests/core/test_backtest_repository.py \
            -q

      - name: Write optional Docker pip config
        id: pipconfig
        shell: bash
        run: |
          set -euo pipefail
          path="${RUNNER_TEMP}/docker-pip.conf"
          rm -f "${path}"
          if [ -n "${{ secrets.PYTHON_PACKAGE_INDEX_URL }}" ] || [ -n "${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}" ]; then
            cat > "${path}" <<EOF
          [global]
          EOF
            if [ -n "${{ secrets.PYTHON_PACKAGE_INDEX_URL }}" ]; then
              echo "index-url = ${{ secrets.PYTHON_PACKAGE_INDEX_URL }}" >> "${path}"
            fi
            if [ -n "${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}" ]; then
              echo "extra-index-url = ${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}" >> "${path}"
            fi
          fi
          if [ -s "${path}" ]; then
            echo "path=${path}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build jobs image smoke
        shell: bash
        run: |
          set -euo pipefail
          build_args=(
            --file asset-allocation-jobs/Dockerfile
            --tag asset-allocation-jobs:ci-smoke
            --build-arg "CONTRACTS_VERSION=0.1.0"
            --build-arg "RUNTIME_COMMON_VERSION=0.1.0"
          )
          if [ -n "${{ steps.pipconfig.outputs.path }}" ]; then
            build_args+=(--secret "id=pipconfig,src=${{ steps.pipconfig.outputs.path }}")
          fi
          DOCKER_BUILDKIT=1 docker build "${build_args[@]}" .

