name: Jobs Deploy Prod
run-name: Jobs Deploy Prod / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - deploy_runtime

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: jobs-prod
  cancel-in-progress: false

jobs:
  deploy-prod:
    name: deploy-prod
    runs-on: ubuntu-22.04
    environment:
      name: prod
    env:
      DISPATCH_IMAGE_DIGEST: ${{ github.event.client_payload.image_digest }}
      DISPATCH_RELEASE_GIT_SHA: ${{ github.event.client_payload.release_git_sha }}
      DISPATCH_RELEASE_RUN_ID: ${{ github.event.client_payload.release_run_id }}
      DISPATCH_ROLLBACK_REASON: ${{ github.event.client_payload.rollback_reason }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      ACR_NAME: ${{ vars.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
      ACR_PULL_IDENTITY_NAME: ${{ vars.ACR_PULL_IDENTITY_NAME || 'asset-allocation-acr-pull-mi' }}
      CONTAINER_APPS_ENVIRONMENT_NAME: ${{ vars.CONTAINER_APPS_ENVIRONMENT_NAME || 'asset-allocation-env' }}
      SERVICE_ACCOUNT_NAME: ${{ vars.SERVICE_ACCOUNT_NAME || 'asset-allocation-sa' }}
      AZURE_STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
      AZURE_CONTAINER_COMMON: ${{ vars.AZURE_CONTAINER_COMMON }}
      AZURE_CONTAINER_BRONZE: ${{ vars.AZURE_CONTAINER_BRONZE }}
      AZURE_CONTAINER_SILVER: ${{ vars.AZURE_CONTAINER_SILVER }}
      AZURE_CONTAINER_GOLD: ${{ vars.AZURE_CONTAINER_GOLD }}
      AZURE_FOLDER_MARKET: ${{ vars.AZURE_FOLDER_MARKET }}
      AZURE_FOLDER_FINANCE: ${{ vars.AZURE_FOLDER_FINANCE }}
      AZURE_FOLDER_EARNINGS: ${{ vars.AZURE_FOLDER_EARNINGS }}
      AZURE_FOLDER_TARGETS: ${{ vars.AZURE_FOLDER_TARGETS }}
      AZURE_FOLDER_ECONOMIC_CATALYST: ${{ vars.AZURE_FOLDER_ECONOMIC_CATALYST || 'economic-catalyst' }}
      AZURE_FOLDER_QUIVER: ${{ vars.AZURE_FOLDER_QUIVER || 'quiver-data' }}
      ASSET_ALLOCATION_API_BASE_URL: ${{ vars.ASSET_ALLOCATION_API_BASE_URL || 'http://asset-allocation-api' }}
      ASSET_ALLOCATION_API_SCOPE: ${{ secrets.ASSET_ALLOCATION_API_SCOPE }}
      ASSET_ALLOCATION_API_TIMEOUT_SECONDS: ${{ vars.ASSET_ALLOCATION_API_TIMEOUT_SECONDS || '600' }}
      ALPHA_VANTAGE_EARNINGS_FRESH_DAYS: ${{ vars.ALPHA_VANTAGE_EARNINGS_FRESH_DAYS }}
      ALPHA_VANTAGE_FINANCE_FRESH_DAYS: ${{ vars.ALPHA_VANTAGE_FINANCE_FRESH_DAYS }}
      ALPHA_VANTAGE_MAX_WORKERS: ${{ vars.ALPHA_VANTAGE_MAX_WORKERS }}
      ALPHA_VANTAGE_TIMEOUT_SECONDS: ${{ vars.ALPHA_VANTAGE_TIMEOUT_SECONDS }}
      ALPHA_VANTAGE_GATEWAY_RETRY_ATTEMPTS: ${{ vars.ALPHA_VANTAGE_GATEWAY_RETRY_ATTEMPTS || '1' }}
      ALPHA_VANTAGE_GATEWAY_RETRY_BASE_SECONDS: ${{ vars.ALPHA_VANTAGE_GATEWAY_RETRY_BASE_SECONDS || '0' }}
      ALPHA_VANTAGE_GATEWAY_RETRY_MAX_SECONDS: ${{ vars.ALPHA_VANTAGE_GATEWAY_RETRY_MAX_SECONDS || '0' }}
      MASSIVE_FINANCE_FRESH_DAYS: ${{ vars.MASSIVE_FINANCE_FRESH_DAYS }}
      MASSIVE_MAX_WORKERS: ${{ vars.MASSIVE_MAX_WORKERS }}
      MASSIVE_TIMEOUT_SECONDS: ${{ vars.MASSIVE_TIMEOUT_SECONDS }}
      BACKFILL_START_DATE: ${{ vars.BACKFILL_START_DATE }}
      DEBUG_SYMBOLS: ${{ vars.DEBUG_SYMBOLS }}
      BRONZE_MARKET_ALPHA_VANTAGE_ENRICHMENT_ENABLED: ${{ vars.BRONZE_MARKET_ALPHA_VANTAGE_ENRICHMENT_ENABLED || 'false' }}
      ECONOMIC_CATALYST_OFFICIAL_SOURCES: ${{ vars.ECONOMIC_CATALYST_OFFICIAL_SOURCES }}
      ECONOMIC_CATALYST_VENDOR_SOURCES: ${{ vars.ECONOMIC_CATALYST_VENDOR_SOURCES || 'nasdaq_tables' }}
      ECONOMIC_CATALYST_STRUCTURED_CORRECTION_LOOKBACK_DAYS: ${{ vars.ECONOMIC_CATALYST_STRUCTURED_CORRECTION_LOOKBACK_DAYS || '90' }}
      ECONOMIC_CATALYST_HEADLINE_CORRECTION_LOOKBACK_DAYS: ${{ vars.ECONOMIC_CATALYST_HEADLINE_CORRECTION_LOOKBACK_DAYS || '14' }}
      ECONOMIC_CATALYST_FUTURE_SCHEDULE_DAYS: ${{ vars.ECONOMIC_CATALYST_FUTURE_SCHEDULE_DAYS || '180' }}
      ECONOMIC_CATALYST_GENERAL_POLL_MINUTES: ${{ vars.ECONOMIC_CATALYST_GENERAL_POLL_MINUTES || '30' }}
      ECONOMIC_CATALYST_ALPHA_VANTAGE_TOPICS: ${{ vars.ECONOMIC_CATALYST_ALPHA_VANTAGE_TOPICS }}
      ECONOMIC_CATALYST_FOMC_SCHEDULE_URLS: ${{ vars.ECONOMIC_CATALYST_FOMC_SCHEDULE_URLS }}
      ECONOMIC_CATALYST_BLS_ICS_URL: ${{ vars.ECONOMIC_CATALYST_BLS_ICS_URL }}
      ECONOMIC_CATALYST_BEA_SCHEDULE_URL: ${{ vars.ECONOMIC_CATALYST_BEA_SCHEDULE_URL }}
      ECONOMIC_CATALYST_ECB_CALENDAR_URL: ${{ vars.ECONOMIC_CATALYST_ECB_CALENDAR_URL }}
      ECONOMIC_CATALYST_BOE_CALENDAR_URL: ${{ vars.ECONOMIC_CATALYST_BOE_CALENDAR_URL }}
      ECONOMIC_CATALYST_BOJ_SCHEDULE_URL: ${{ vars.ECONOMIC_CATALYST_BOJ_SCHEDULE_URL }}
      ECONOMIC_CATALYST_TREASURY_AUCTIONS_URL: ${{ vars.ECONOMIC_CATALYST_TREASURY_AUCTIONS_URL }}
      ECONOMIC_CATALYST_NASDAQ_TABLES: ${{ vars.ECONOMIC_CATALYST_NASDAQ_TABLES || '[]' }}
      ECONOMIC_CATALYST_HTTP_TIMEOUT_SECONDS: ${{ vars.ECONOMIC_CATALYST_HTTP_TIMEOUT_SECONDS || '30' }}
      QUIVER_DATA_ENABLED: ${{ vars.QUIVER_DATA_ENABLED || 'false' }}
      QUIVER_DATA_JOB_MODE: ${{ vars.QUIVER_DATA_JOB_MODE || 'incremental' }}
      QUIVER_DATA_TICKER_BATCH_SIZE: ${{ vars.QUIVER_DATA_TICKER_BATCH_SIZE || '50' }}
      QUIVER_DATA_HISTORICAL_BATCH_SIZE: ${{ vars.QUIVER_DATA_HISTORICAL_BATCH_SIZE || '20' }}
      QUIVER_DATA_SYMBOL_LIMIT: ${{ vars.QUIVER_DATA_SYMBOL_LIMIT || '500' }}
      QUIVER_DATA_PAGE_SIZE: ${{ vars.QUIVER_DATA_PAGE_SIZE || '100' }}
      QUIVER_DATA_MAX_PAGES_PER_REQUEST: ${{ vars.QUIVER_DATA_MAX_PAGES_PER_REQUEST || '0' }}
      QUIVER_DATA_SEC13F_TODAY_ONLY: ${{ vars.QUIVER_DATA_SEC13F_TODAY_ONLY || 'true' }}
      JOB_STARTUP_API_CONTAINER_APPS: ${{ vars.JOB_STARTUP_API_CONTAINER_APPS || 'asset-allocation-api' }}
      GOLD_REGIME_INPUT_READINESS_RETRY_ATTEMPTS: ${{ vars.GOLD_REGIME_INPUT_READINESS_RETRY_ATTEMPTS || '3' }}
      GOLD_REGIME_INPUT_READINESS_RETRY_SLEEP_SECONDS: ${{ vars.GOLD_REGIME_INPUT_READINESS_RETRY_SLEEP_SECONDS || '60' }}
      STRATEGY_PUBLICATION_SIGNAL_ATTEMPTS: ${{ vars.STRATEGY_PUBLICATION_SIGNAL_ATTEMPTS || '3' }}
      SILVER_MARKET_JOB: ${{ vars.SILVER_MARKET_JOB || 'silver-market-job' }}
      SILVER_FINANCE_JOB: ${{ vars.SILVER_FINANCE_JOB || 'silver-finance-job' }}
      SILVER_PRICE_TARGET_JOB: ${{ vars.SILVER_PRICE_TARGET_JOB || 'silver-price-target-job' }}
      SILVER_EARNINGS_JOB: ${{ vars.SILVER_EARNINGS_JOB || 'silver-earnings-job' }}
      SILVER_ECONOMIC_CATALYST_JOB: ${{ vars.SILVER_ECONOMIC_CATALYST_JOB || 'silver-economic-catalyst-job' }}
      SILVER_QUIVER_JOB: ${{ vars.SILVER_QUIVER_JOB || 'silver-quiver-data-job' }}
      GOLD_MARKET_JOB: ${{ vars.GOLD_MARKET_JOB || 'gold-market-job' }}
      GOLD_FINANCE_JOB: ${{ vars.GOLD_FINANCE_JOB || 'gold-finance-job' }}
      GOLD_PRICE_TARGET_JOB: ${{ vars.GOLD_PRICE_TARGET_JOB || 'gold-price-target-job' }}
      GOLD_EARNINGS_JOB: ${{ vars.GOLD_EARNINGS_JOB || 'gold-earnings-job' }}
      GOLD_ECONOMIC_CATALYST_JOB: ${{ vars.GOLD_ECONOMIC_CATALYST_JOB || 'gold-economic-catalyst-job' }}
      GOLD_QUIVER_JOB: ${{ vars.GOLD_QUIVER_JOB || 'gold-quiver-data-job' }}
      RESULTS_RECONCILE_JOB: ${{ vars.RESULTS_RECONCILE_JOB || 'results-reconcile-job' }}
      AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      NASDAQ_API_KEY: ${{ secrets.NASDAQ_API_KEY }}
      MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: ./.github/actions/setup-python-jobs
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.lock.txt
            pyproject.toml
          python-package-index-url: ${{ secrets.PYTHON_PACKAGE_INDEX_URL }}
          python-package-extra-index-url: ${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}

      - name: Install deploy dependencies
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflows/install_jobs_dependencies.py \
            --jobs-path . \
            --requirements requirements.lock.txt \
            --editable-no-deps . \
            --pip-check

      - name: Resolve rollout image
        id: image
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "repository_dispatch" ] && [ -n "${DISPATCH_IMAGE_DIGEST}" ]; then
            if [ -z "${DISPATCH_RELEASE_RUN_ID}" ] || [ -z "${DISPATCH_RELEASE_GIT_SHA}" ]; then
              echo "repository_dispatch deploys must include image_digest, release_run_id, and release_git_sha" >&2
              exit 1
            fi
            resolver_args=(
              python scripts/workflows/resolve_release_image_digest.py
              --repo "${GITHUB_REPOSITORY}"
              --branch main
              --workflow "release.yml"
              --artifact "jobs-release"
              --image-repository "asset-allocation-jobs"
              --run-id "${DISPATCH_RELEASE_RUN_ID}"
              --expected-digest "${DISPATCH_IMAGE_DIGEST}"
              --expected-git-sha "${DISPATCH_RELEASE_GIT_SHA}"
              --github-output "$GITHUB_OUTPUT"
            )
            if [ -n "${DISPATCH_ROLLBACK_REASON}" ]; then
              resolver_args+=(--allow-rollback --max-age-days 14)
            fi
            "${resolver_args[@]}"
            exit 0
          fi
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "workflow_dispatch prod deploys must be run from main." >&2
            exit 1
          fi
          python scripts/workflows/resolve_release_image_digest.py \
            --repo "${GITHUB_REPOSITORY}" \
            --branch main \
            --workflow "release.yml" \
            --artifact "jobs-release" \
            --image-repository "asset-allocation-jobs" \
            --github-output "$GITHUB_OUTPUT"

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Azure resource identifiers
        id: azure
        shell: bash
        run: |
          set -euo pipefail
          az config set extension.use_dynamic_install=yes_without_prompt > /dev/null
          identity_id="$(az identity show --name "${ACR_PULL_IDENTITY_NAME}" --resource-group "${RESOURCE_GROUP}" --query id -o tsv)"
          identity_client_id="$(az identity show --name "${ACR_PULL_IDENTITY_NAME}" --resource-group "${RESOURCE_GROUP}" --query clientId -o tsv)"
          if ! env_id="$(az containerapp env show --name "${CONTAINER_APPS_ENVIRONMENT_NAME}" --resource-group "${RESOURCE_GROUP}" --query id -o tsv)"; then
            echo "Container Apps environment '${CONTAINER_APPS_ENVIRONMENT_NAME}' was not found in resource group '${RESOURCE_GROUP}'." >&2
            echo "Available Container Apps environments in '${RESOURCE_GROUP}':" >&2
            az containerapp env list --resource-group "${RESOURCE_GROUP}" --query "[].name" -o tsv >&2 || true
            exit 1
          fi
          registry="${ACR_LOGIN_SERVER:-${ACR_NAME}.azurecr.io}"
          registry="${registry#https://}"
          registry="${registry%/}"
          if [ -z "${registry}" ] || [[ "${registry}" == */* ]]; then
            echo "ACR_LOGIN_SERVER must be a registry host such as assetallocationacr.azurecr.io." >&2
            exit 1
          fi
          expected_prefix="${registry}/asset-allocation-jobs@sha256:"
          image_digest="${{ steps.image.outputs.image_digest }}"
          case "${image_digest}" in
            "${expected_prefix}"*)
              digest="${image_digest#"${expected_prefix}"}"
              ;;
            *)
              echo "Resolved image must point to ${expected_prefix}<digest>." >&2
              exit 1
              ;;
          esac
          if ! [[ "${digest}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Resolved image digest is not a sha256 digest: ${image_digest}" >&2
            exit 1
          fi
          {
            echo "identity_id=${identity_id}"
            echo "identity_client_id=${identity_client_id}"
            echo "environment_id=${env_id}"
          } >> "$GITHUB_OUTPUT"

      - name: Capture current job images
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflows/capture_current_job_images.py \
            --deploy-dir deploy \
            --resource-group "${RESOURCE_GROUP}" \
            --output artifacts/previous-job-images.json

      - name: Render and apply job manifests
        env:
          JOB_IMAGE: ${{ steps.image.outputs.image_digest }}
          ACR_PULL_IDENTITY_RESOURCE_ID: ${{ steps.azure.outputs.identity_id }}
          ACR_PULL_IDENTITY_CLIENT_ID: ${{ steps.azure.outputs.identity_client_id }}
          CONTAINER_APPS_ENVIRONMENT_ID: ${{ steps.azure.outputs.environment_id }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflows/render_and_apply_job_manifests.py \
            --deploy-dir deploy \
            --rendered-dir artifacts/rendered \
            --redacted-dir artifacts/deploy-support/redacted-manifests \
            --resource-group "${RESOURCE_GROUP}"

      - name: Write deploy provenance
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/deploy-support
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "image_digest": os.environ["DEPLOY_IMAGE_DIGEST"],
              "image_source": os.environ["DEPLOY_IMAGE_SOURCE"],
              "release_branch": os.environ["DEPLOY_RELEASE_BRANCH"],
              "release_git_sha": os.environ["DEPLOY_RELEASE_GIT_SHA"],
              "release_run_id": os.environ["DEPLOY_RELEASE_RUN_ID"],
          }
          Path("artifacts/deploy-support/deploy-provenance.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
        env:
          DEPLOY_IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}
          DEPLOY_IMAGE_SOURCE: ${{ steps.image.outputs.image_source }}
          DEPLOY_RELEASE_BRANCH: ${{ steps.image.outputs.release_branch || github.ref_name }}
          DEPLOY_RELEASE_GIT_SHA: ${{ steps.image.outputs.release_git_sha || '' }}
          DEPLOY_RELEASE_RUN_ID: ${{ steps.image.outputs.release_run_id || '' }}

      - name: Verify deployed job images
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflows/verify_deployed_job_images.py \
            --rendered-dir artifacts/rendered \
            --resource-group "${RESOURCE_GROUP}" \
            --expected-image "${{ steps.image.outputs.image_digest }}"

      - name: Verify deployed job runtime
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflows/verify_deployed_job_runtime.py \
            --rendered-dir artifacts/rendered \
            --resource-group "${RESOURCE_GROUP}" \
            --expected-image "${{ steps.image.outputs.image_digest }}"

      - name: Delete retired jobs
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflows/delete_retired_jobs.py \
            --resource-group "${RESOURCE_GROUP}"

      - name: Upload deploy support data
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: jobs-deploy-support
          path: |
            artifacts/deploy-support/redacted-manifests/*
            artifacts/deploy-support/deploy-provenance.json
            artifacts/previous-job-images.json
          if-no-files-found: error
          retention-days: 14

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "## Jobs deploy"
            echo ""
            echo "- Image: \`${{ steps.image.outputs.image_digest }}\`"
            echo "- Image source: \`${{ steps.image.outputs.image_source }}\`"
            echo "- Release branch: \`${{ steps.image.outputs.release_branch || github.ref_name }}\`"
            echo "- Release run: \`${{ steps.image.outputs.release_run_id || 'not resolved' }}\`"
            echo "- Release git SHA: \`${{ steps.image.outputs.release_git_sha || 'not resolved' }}\`"
            echo "- Redacted manifests: \`artifacts/deploy-support/redacted-manifests/*\`"
            echo "- Previous job images: \`artifacts/previous-job-images.json\`"
            echo "- Rollback: send a \`deploy_runtime\` repository dispatch with image digest, release run ID, and release git SHA from a verified release artifact"
          } >> "${GITHUB_STEP_SUMMARY}"
