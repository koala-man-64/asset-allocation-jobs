name: Trigger Jobs
run-name: Trigger Jobs / ${{ github.event.inputs.job }}

on:
  workflow_dispatch:
    inputs:
      job:
        description: Select exactly one ACA job to start
        required: true
        type: choice
        options:
          - bronze_market
          - bronze_finance
          - bronze_price_target
          - bronze_earnings
          - silver_market
          - silver_finance
          - silver_price_target
          - silver_earnings
          - gold_market
          - gold_finance
          - gold_price_target
          - gold_earnings
          - gold_regime
          - platinum_rankings
          - backtests

permissions:
  contents: read
  id-token: write

concurrency:
  group: trigger-job-${{ github.event.inputs.job }}
  cancel-in-progress: false

jobs:
  trigger-job:
    name: trigger-job
    runs-on: ubuntu-22.04
    environment:
      name: prod
    env:
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      BRONZE_MARKET_JOB: ${{ vars.BRONZE_MARKET_JOB || 'bronze-market-job' }}
      BRONZE_FINANCE_JOB: ${{ vars.BRONZE_FINANCE_JOB || 'bronze-finance-job' }}
      BRONZE_PRICE_TARGET_JOB: ${{ vars.BRONZE_PRICE_TARGET_JOB || 'bronze-price-target-job' }}
      BRONZE_EARNINGS_JOB: ${{ vars.BRONZE_EARNINGS_JOB || 'bronze-earnings-job' }}
      SILVER_MARKET_JOB: ${{ vars.SILVER_MARKET_JOB || 'silver-market-job' }}
      SILVER_FINANCE_JOB: ${{ vars.SILVER_FINANCE_JOB || 'silver-finance-job' }}
      SILVER_PRICE_TARGET_JOB: ${{ vars.SILVER_PRICE_TARGET_JOB || 'silver-price-target-job' }}
      SILVER_EARNINGS_JOB: ${{ vars.SILVER_EARNINGS_JOB || 'silver-earnings-job' }}
      GOLD_MARKET_JOB: ${{ vars.GOLD_MARKET_JOB || 'gold-market-job' }}
      GOLD_FINANCE_JOB: ${{ vars.GOLD_FINANCE_JOB || 'gold-finance-job' }}
      GOLD_PRICE_TARGET_JOB: ${{ vars.GOLD_PRICE_TARGET_JOB || 'gold-price-target-job' }}
      GOLD_EARNINGS_JOB: ${{ vars.GOLD_EARNINGS_JOB || 'gold-earnings-job' }}
      GOLD_REGIME_JOB: ${{ vars.GOLD_REGIME_JOB || 'gold-regime-job' }}
      PLATINUM_RANKINGS_JOB: ${{ vars.PLATINUM_RANKINGS_JOB || 'platinum-rankings-job' }}
      BACKTEST_JOB: ${{ vars.BACKTEST_JOB || 'backtests-job' }}
    steps:
      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve selected job
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          case "${{ github.event.inputs.job }}" in
            bronze_market) selected_job="${BRONZE_MARKET_JOB}" ;;
            bronze_finance) selected_job="${BRONZE_FINANCE_JOB}" ;;
            bronze_price_target) selected_job="${BRONZE_PRICE_TARGET_JOB}" ;;
            bronze_earnings) selected_job="${BRONZE_EARNINGS_JOB}" ;;
            silver_market) selected_job="${SILVER_MARKET_JOB}" ;;
            silver_finance) selected_job="${SILVER_FINANCE_JOB}" ;;
            silver_price_target) selected_job="${SILVER_PRICE_TARGET_JOB}" ;;
            silver_earnings) selected_job="${SILVER_EARNINGS_JOB}" ;;
            gold_market) selected_job="${GOLD_MARKET_JOB}" ;;
            gold_finance) selected_job="${GOLD_FINANCE_JOB}" ;;
            gold_price_target) selected_job="${GOLD_PRICE_TARGET_JOB}" ;;
            gold_earnings) selected_job="${GOLD_EARNINGS_JOB}" ;;
            gold_regime) selected_job="${GOLD_REGIME_JOB}" ;;
            platinum_rankings) selected_job="${PLATINUM_RANKINGS_JOB}" ;;
            backtests) selected_job="${BACKTEST_JOB}" ;;
            *)
              echo "::error::Unsupported job input: ${{ github.event.inputs.job }}"
              exit 1
              ;;
          esac
          echo "job_name=${selected_job}" >> "$GITHUB_OUTPUT"

      - name: Trigger selected job
        shell: bash
        run: |
          set -euo pipefail
          az containerapp job start --name "${{ steps.resolve.outputs.job_name }}" --resource-group "${RESOURCE_GROUP}"

      - name: Write trigger summary
        shell: bash
        run: |
          {
            echo "## Job trigger"
            echo ""
            echo "- Triggered job: \`${{ steps.resolve.outputs.job_name }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
