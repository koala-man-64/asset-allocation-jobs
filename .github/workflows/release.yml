name: Jobs Release
run-name: Jobs Release / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: jobs-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-22.04
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
      image_digest: ${{ steps.image.outputs.image_digest }}
      contracts_version: ${{ steps.shared.outputs.contracts_version }}
      runtime_common_version: ${{ steps.shared.outputs.runtime_common_version }}
      jobs_version: ${{ steps.shared.outputs.jobs_version }}
    steps:
      - name: Checkout jobs repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-jobs

      - name: Set up Python
        id: python
        uses: ./asset-allocation-jobs/.github/actions/setup-python-jobs
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            asset-allocation-jobs/requirements.lock.txt
            asset-allocation-jobs/pyproject.toml
          python-package-index-url: ${{ secrets.PYTHON_PACKAGE_INDEX_URL }}
          python-package-extra-index-url: ${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}

      - name: Resolve shared package versions
        id: shared
        shell: bash
        run: |
          set -euo pipefail
          cd asset-allocation-jobs
          python scripts/workflows/resolve_shared_versions.py >> "$GITHUB_OUTPUT"

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        shell: bash
        run: |
          set -euo pipefail
          az acr login --name "${{ vars.ACR_NAME }}"

      - name: Build and push jobs image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          registry="$(az acr show --name "${{ vars.ACR_NAME }}" --resource-group "${{ vars.RESOURCE_GROUP }}" --query loginServer -o tsv)"
          image_ref="${registry}/asset-allocation-jobs:${GITHUB_SHA}"
          build_args=(
            python
            asset-allocation-jobs/scripts/workflows/build_jobs_image.py
            --dockerfile
            asset-allocation-jobs/Dockerfile
            --image-ref
            "${image_ref}"
            --contracts-version
            "${{ steps.shared.outputs.contracts_version }}"
            --runtime-common-version
            "${{ steps.shared.outputs.runtime_common_version }}"
            --context
            asset-allocation-jobs
            --push
            --github-output
            "$GITHUB_OUTPUT"
          )
          if [ -n "${{ steps.python.outputs.pip-config-path }}" ]; then
            build_args+=(--pip-config-path "${{ steps.python.outputs.pip-config-path }}")
          fi
          "${build_args[@]}"

      - name: Write release manifest
        shell: bash
        run: |
          set -euo pipefail
          python asset-allocation-jobs/scripts/workflows/write_release_manifest.py \
            --repo "${GITHUB_REPOSITORY}" \
            --git-sha "${GITHUB_SHA}" \
            --image-ref "${IMAGE_REF}" \
            --image-digest "${IMAGE_DIGEST}" \
            --contracts-version "${CONTRACTS_VERSION}" \
            --runtime-common-version "${RUNTIME_COMMON_VERSION}" \
            --jobs-version "${JOBS_VERSION}" \
            --output artifacts/release-manifest.json
        env:
          CONTRACTS_VERSION: ${{ steps.shared.outputs.contracts_version }}
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
          IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}
          JOBS_VERSION: ${{ steps.shared.outputs.jobs_version }}
          RUNTIME_COMMON_VERSION: ${{ steps.shared.outputs.runtime_common_version }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: jobs-release
          path: artifacts/release-manifest.json
          if-no-files-found: error
          retention-days: 30

      - name: Write release summary
        env:
          IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}
        shell: bash
        run: |
          {
            echo "## Jobs release"
            echo ""
            echo "- Image: \`${IMAGE_DIGEST}\`"
            echo "- Contracts: \`${{ steps.shared.outputs.contracts_version }}\`"
            echo "- Runtime common: \`${{ steps.shared.outputs.runtime_common_version }}\`"
            echo "- Manifest: \`artifacts/release-manifest.json\`"
          } >> "${GITHUB_STEP_SUMMARY}"
