name: Jobs Release
run-name: Jobs Release / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: jobs-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout jobs repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-jobs

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            asset-allocation-jobs/requirements.lock.txt
            asset-allocation-jobs/pyproject.toml

      - name: Configure optional pip indexes
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ secrets.PYTHON_PACKAGE_INDEX_URL }}" ] || [ -n "${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}" ]; then
            cat > "${RUNNER_TEMP}/pip.conf" <<EOF
          [global]
          EOF
            if [ -n "${{ secrets.PYTHON_PACKAGE_INDEX_URL }}" ]; then
              echo "index-url = ${{ secrets.PYTHON_PACKAGE_INDEX_URL }}" >> "${RUNNER_TEMP}/pip.conf"
            fi
            if [ -n "${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}" ]; then
              echo "extra-index-url = ${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}" >> "${RUNNER_TEMP}/pip.conf"
            fi
            echo "PIP_CONFIG_FILE=${RUNNER_TEMP}/pip.conf" >> "$GITHUB_ENV"
          fi

      - name: Resolve shared package versions
        id: shared
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("asset-allocation-jobs/pyproject.toml").read_text(encoding="utf-8"))
          dependencies = {}
          for dependency in pyproject["project"]["dependencies"]:
              if dependency.startswith("asset-allocation-"):
                  name, version = dependency.split("==", 1)
                  dependencies[name] = version
          with Path("shared-versions.txt").open("w", encoding="utf-8") as handle:
              handle.write(f"contracts_version={dependencies['asset-allocation-contracts']}\n")
              handle.write(f"runtime_common_version={dependencies['asset-allocation-runtime-common']}\n")
              handle.write(f"jobs_version={pyproject['project']['version']}\n")
          PY
          cat shared-versions.txt >> "$GITHUB_OUTPUT"

      - name: Write optional Docker pip config
        id: pipconfig
        shell: bash
        run: |
          set -euo pipefail
          path="${RUNNER_TEMP}/docker-pip.conf"
          rm -f "${path}"
          if [ -n "${{ secrets.PYTHON_PACKAGE_INDEX_URL }}" ] || [ -n "${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}" ]; then
            cat > "${path}" <<EOF
          [global]
          EOF
            if [ -n "${{ secrets.PYTHON_PACKAGE_INDEX_URL }}" ]; then
              echo "index-url = ${{ secrets.PYTHON_PACKAGE_INDEX_URL }}" >> "${path}"
            fi
            if [ -n "${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}" ]; then
              echo "extra-index-url = ${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}" >> "${path}"
            fi
          fi
          if [ -s "${path}" ]; then
            echo "path=${path}" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        shell: bash
        run: |
          set -euo pipefail
          az acr login --name "${{ vars.ACR_NAME }}"

      - name: Build and push jobs image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          registry="$(az acr show --name "${{ vars.ACR_NAME }}" --resource-group "${{ vars.RESOURCE_GROUP }}" --query loginServer -o tsv)"
          image_ref="${registry}/asset-allocation-jobs:${GITHUB_SHA}"
          build_args=(
            --file asset-allocation-jobs/Dockerfile
            --tag "${image_ref}"
            --build-arg "CONTRACTS_VERSION=${{ steps.shared.outputs.contracts_version }}"
            --build-arg "RUNTIME_COMMON_VERSION=${{ steps.shared.outputs.runtime_common_version }}"
          )
          if [ -n "${{ steps.pipconfig.outputs.path }}" ]; then
            build_args+=(--secret "id=pipconfig,src=${{ steps.pipconfig.outputs.path }}")
          fi
          DOCKER_BUILDKIT=1 docker build "${build_args[@]}" .
          docker push "${image_ref}"
          image_digest="$(docker inspect --format='{{index .RepoDigests 0}}' "${image_ref}")"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          echo "image_digest=${image_digest}" >> "$GITHUB_OUTPUT"

      - name: Write release manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python - <<'PY'
          import json
          import tomllib
          from pathlib import Path
          import os

          project = tomllib.loads(Path("asset-allocation-jobs/pyproject.toml").read_text(encoding="utf-8"))
          shared = {}
          for dependency in project["project"]["dependencies"]:
              if dependency.startswith("asset-allocation-"):
                  name, version = dependency.split("==", 1)
                  shared[name] = version
          manifest = {
              "repo": os.environ["GITHUB_REPOSITORY"],
              "git_sha": os.environ["GITHUB_SHA"],
              "artifact_kind": "container-image",
              "artifact_ref": os.environ["IMAGE_REF"],
              "image_digest": os.environ["IMAGE_DIGEST"],
              "version_matrix": {
                  "contracts": shared.get("asset-allocation-contracts"),
                  "runtime_common": shared.get("asset-allocation-runtime-common"),
                  "control_plane": None,
                  "jobs": project["project"]["version"],
                  "ui": None,
              },
          }
          Path("artifacts/release-manifest.json").write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY
        env:
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
          IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jobs-release
          path: artifacts/release-manifest.json
          if-no-files-found: error
          retention-days: 30

      - name: Write release summary
        env:
          IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}
        shell: bash
        run: |
          {
            echo "## Jobs release"
            echo ""
            echo "- Image: \`${IMAGE_DIGEST}\`"
            echo "- Contracts: \`${{ steps.shared.outputs.contracts_version }}\`"
            echo "- Runtime common: \`${{ steps.shared.outputs.runtime_common_version }}\`"
            echo "- Manifest: \`artifacts/release-manifest.json\`"
          } >> "${GITHUB_STEP_SUMMARY}"

