name: Jobs Security
run-name: Jobs Security / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: jobs-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-dependency-audit:
    name: python-dependency-audit
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.lock.txt
            requirements-dev.lock.txt

      - name: Audit Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          pip-audit -r requirements.lock.txt --format json -o artifacts/pip-audit-runtime.json || true
          pip-audit -r requirements-dev.lock.txt --format json -o artifacts/pip-audit-dev.json || true
          pip-audit --strict -r requirements.lock.txt
          pip-audit --strict --ignore-vuln GHSA-5239-wwwm-4pmq -r requirements-dev.lock.txt

      - name: Upload Python audit artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jobs-python-audit
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

  dependency-governance:
    name: dependency-governance
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Run dependency governance checks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python scripts/dependency_governance.py check --report artifacts/dependency_governance_report.json

      - name: Upload governance report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jobs-dependency-governance
          path: artifacts/dependency_governance_report.json
          if-no-files-found: error
          retention-days: 14
