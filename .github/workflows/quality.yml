name: Jobs Quality
run-name: Jobs Quality / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:
    inputs:
      mode:
        description: Select which quality checks to run
        required: true
        default: all
        type: choice
        options:
          - all
          - ci
          - security

permissions:
  contents: read

concurrency:
  group: jobs-quality-${{ github.event_name }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: workflow-lint
    if: github.event_name != 'schedule' && (github.event_name != 'workflow_dispatch' || inputs.mode != 'security')
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: actionlint
        uses: rhysd/actionlint@393031adb9afb225ee52ae2ccd7a5af5525e03e8 # v1.7.11

  runtime-quality:
    name: runtime-quality
    if: github.event_name != 'schedule' && (github.event_name != 'workflow_dispatch' || inputs.mode != 'security')
    runs-on: ubuntu-22.04
    env:
      TEST_MODE: "1"
      LOG_FORMAT: "TEXT"
      LOG_LEVEL: "INFO"
      AZURE_STORAGE_ACCOUNT_NAME: localdev
      AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=test;AccountKey=key;EndpointSuffix=core.windows.net
      AZURE_CONTAINER_COMMON: common
      ASSET_ALLOCATION_API_BASE_URL: http://asset-allocation-api-vnet
      ASSET_ALLOCATION_API_SCOPE: api://asset-allocation
      POSTGRES_DSN: postgresql://user:pass@localhost:5432/asset_allocation?sslmode=disable
    steps:
      - name: Checkout jobs repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-jobs

      - name: Set up Python
        id: python
        uses: ./asset-allocation-jobs/.github/actions/setup-python-jobs
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            asset-allocation-jobs/requirements.lock.txt
            asset-allocation-jobs/requirements-dev.lock.txt
            asset-allocation-jobs/pyproject.toml
          python-package-index-url: ${{ secrets.PYTHON_PACKAGE_INDEX_URL }}
          python-package-extra-index-url: ${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}

      - name: Install test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python asset-allocation-jobs/scripts/workflows/install_jobs_dependencies.py \
            --jobs-path asset-allocation-jobs \
            --requirements asset-allocation-jobs/requirements.lock.txt \
            --include-dev-lockfile \
            --editable-no-deps asset-allocation-jobs \
            --pip-check

      - name: Run ruff
        shell: bash
        run: |
          set -euo pipefail
          cd asset-allocation-jobs
          python scripts/run_quality_gate.py lint-python

      - name: Run fast quality tests
        shell: bash
        run: |
          set -euo pipefail
          cd asset-allocation-jobs
          python scripts/run_quality_gate.py test-fast

      - name: Run backtesting runtime tests
        shell: bash
        run: |
          set -euo pipefail
          cd asset-allocation-jobs
          python scripts/run_quality_gate.py test-backtesting-runtime

      - name: Resolve shared package versions
        id: shared
        shell: bash
        run: |
          set -euo pipefail
          cd asset-allocation-jobs
          python scripts/workflows/resolve_shared_versions.py >> "$GITHUB_OUTPUT"

      - name: Build jobs image smoke
        shell: bash
        run: |
          set -euo pipefail
          build_args=(
            python
            asset-allocation-jobs/scripts/workflows/build_jobs_image.py
            --dockerfile
            asset-allocation-jobs/Dockerfile
            --image-ref
            asset-allocation-jobs:ci-smoke
            --contracts-version
            "${{ steps.shared.outputs.contracts_version }}"
            --runtime-common-version
            "${{ steps.shared.outputs.runtime_common_version }}"
            --context
            asset-allocation-jobs
          )
          if [ -n "${{ steps.python.outputs.pip-config-path }}" ]; then
            build_args+=(--pip-config-path "${{ steps.python.outputs.pip-config-path }}")
          fi
          "${build_args[@]}"

  security-governance:
    name: security-governance
    if: github.event_name == 'schedule' || github.event_name == 'pull_request' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode != 'ci')
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: ./.github/actions/setup-python-jobs
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements.lock.txt
            requirements-dev.lock.txt
          python-package-index-url: ${{ secrets.PYTHON_PACKAGE_INDEX_URL }}
          python-package-extra-index-url: ${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}

      - name: Run dependency audit and governance checks
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflows/run_security_governance.py --artifacts-dir artifacts

      - name: Upload security and governance artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: jobs-security-governance
          path: |
            artifacts/pip-audit-runtime.json
            artifacts/pip-audit-dev.json
            artifacts/dependency_governance_report.json
          if-no-files-found: error
          retention-days: 14
