name: Jobs Integration
run-name: Jobs Integration / ${{ github.event_name }} / ${{ github.event.action || inputs.operation || github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Select the integration operation
        required: true
        default: control-plane-compat
        type: choice
        options:
          - control-plane-compat
          - runtime-common-compat
          - adopt-contracts
      ref:
        description: Candidate ref or SHA to validate
        required: false
        default: main
        type: string
      contracts_version:
        description: Contracts package version to pin
        required: false
        type: string
  repository_dispatch:
    types:
      - control_plane_released
      - runtime_common_released
      - contracts_released

permissions:
  contents: read

concurrency:
  group: jobs-integration-${{ github.event_name }}-${{ github.event.action || inputs.operation || github.ref || github.run_id }}
  cancel-in-progress: false

env:
  TEST_MODE: "1"
  LOG_FORMAT: "TEXT"
  LOG_LEVEL: "INFO"
  AZURE_STORAGE_ACCOUNT_NAME: localdev
  AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=test;AccountKey=key;EndpointSuffix=core.windows.net
  AZURE_CONTAINER_COMMON: common
  ASSET_ALLOCATION_API_BASE_URL: https://control-plane.example
  ASSET_ALLOCATION_API_SCOPE: api://asset-allocation
  POSTGRES_DSN: postgresql://user:pass@localhost:5432/asset_allocation?sslmode=disable

jobs:
  control-plane-compat:
    name: control-plane-compat
    if: (github.event_name == 'repository_dispatch' && github.event.action == 'control_plane_released') || (github.event_name == 'workflow_dispatch' && inputs.operation == 'control-plane-compat')
    runs-on: ubuntu-22.04
    env:
      DISPATCH_CONTROL_PLANE_SHA: ${{ github.event.client_payload.control_plane_sha }}
    steps:
      - name: Resolve control-plane ref
        id: refs
        shell: bash
        run: |
          set -euo pipefail
          control_plane_ref="${{ inputs.ref }}"
          if [ "${GITHUB_EVENT_NAME}" = "repository_dispatch" ]; then
            control_plane_ref="${DISPATCH_CONTROL_PLANE_SHA}"
          fi
          control_plane_ref="${control_plane_ref:-main}"
          echo "control_plane_ref=${control_plane_ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout jobs repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-jobs

      - name: Checkout control-plane repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ vars.CONTROL_PLANE_REPOSITORY || format('{0}/asset-allocation-control-plane', github.repository_owner) }}
          ref: ${{ steps.refs.outputs.control_plane_ref }}
          path: asset-allocation-control-plane

      - name: Set up Python
        uses: ./asset-allocation-jobs/.github/actions/setup-python-jobs
        with:
          python-version: "3.14"
          python-package-index-url: ${{ secrets.PYTHON_PACKAGE_INDEX_URL }}
          python-package-extra-index-url: ${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}

      - name: Install compatibility dependencies
        shell: bash
        run: |
          set -euo pipefail
          python asset-allocation-jobs/scripts/workflows/install_jobs_dependencies.py \
            --jobs-path asset-allocation-jobs \
            --requirements asset-allocation-jobs/requirements.lock.txt \
            --requirements asset-allocation-control-plane/requirements.lock.txt \
            --include-dev-lockfile \
            --editable-no-deps asset-allocation-jobs

      - name: Export control-plane contract artifacts
        shell: bash
        run: |
          set -euo pipefail
          python asset-allocation-control-plane/scripts/automation/export_contract_artifacts.py

      - name: Run jobs compatibility suite
        shell: bash
        run: |
          set -euo pipefail
          cd asset-allocation-jobs
          python scripts/run_quality_gate.py test-control-plane-compat

      - name: Write compatibility summary
        shell: bash
        run: |
          {
            echo "## Jobs control-plane compatibility"
            echo ""
            echo "- Control-plane ref: \`${{ steps.refs.outputs.control_plane_ref }}\`"
            echo "- Result: passed"
          } >> "${GITHUB_STEP_SUMMARY}"

  runtime-common-compat:
    name: runtime-common-compat
    if: (github.event_name == 'repository_dispatch' && github.event.action == 'runtime_common_released') || (github.event_name == 'workflow_dispatch' && inputs.operation == 'runtime-common-compat')
    runs-on: ubuntu-22.04
    env:
      DISPATCH_RUNTIME_COMMON_SHA: ${{ github.event.client_payload.runtime_common_sha }}
      DISPATCH_RUNTIME_COMMON_REF: ${{ github.event.client_payload.runtime_common_ref }}
    steps:
      - name: Resolve runtime-common ref
        id: runtime-common
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ inputs.ref }}"
          if [ "${GITHUB_EVENT_NAME}" = "repository_dispatch" ]; then
            ref="${DISPATCH_RUNTIME_COMMON_SHA:-${DISPATCH_RUNTIME_COMMON_REF}}"
          fi
          ref="${ref:-main}"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"

      - name: Checkout jobs repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-jobs

      - name: Checkout runtime-common repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ format('{0}/asset-allocation-runtime-common', github.repository_owner) }}
          ref: ${{ steps.runtime-common.outputs.ref }}
          path: asset-allocation-runtime-common

      - name: Set up Python
        uses: ./asset-allocation-jobs/.github/actions/setup-python-jobs
        with:
          python-version: "3.14"
          python-package-index-url: ${{ secrets.PYTHON_PACKAGE_INDEX_URL }}
          python-package-extra-index-url: ${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}

      - name: Install compatibility dependencies
        shell: bash
        run: |
          set -euo pipefail
          python asset-allocation-jobs/scripts/workflows/install_jobs_dependencies.py \
            --jobs-path asset-allocation-jobs \
            --requirements asset-allocation-jobs/requirements.lock.txt \
            --include-dev-lockfile \
            --editable asset-allocation-runtime-common/python \
            --editable-no-deps asset-allocation-jobs \
            --shared-dependency-exclude asset-allocation-runtime-common

      - name: Run jobs compatibility suite
        shell: bash
        run: |
          set -euo pipefail
          cd asset-allocation-jobs
          python scripts/run_quality_gate.py test-runtime-common-compat

      - name: Write compatibility summary
        shell: bash
        run: |
          {
            echo "## Jobs runtime-common compatibility"
            echo ""
            echo "- Runtime-common ref: \`${{ steps.runtime-common.outputs.ref }}\`"
            echo "- Result: passed"
          } >> "${GITHUB_STEP_SUMMARY}"

  adopt-contracts:
    name: adopt-contracts
    if: (github.event_name == 'repository_dispatch' && github.event.action == 'contracts_released') || (github.event_name == 'workflow_dispatch' && inputs.operation == 'adopt-contracts')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Resolve adoption inputs
        id: inputs
        shell: bash
        run: |
          set -euo pipefail
          contracts_version="${{ inputs.contracts_version }}"
          target_branch="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "repository_dispatch" ]; then
            contracts_version="${{ github.event.client_payload.contracts_version }}"
            target_branch="${{ github.event.repository.default_branch }}"
          fi
          : "${contracts_version:?contracts_version is required either as workflow input or repository_dispatch payload}"
          {
            echo "contracts_version=${contracts_version}"
            echo "target_branch=${target_branch}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout jobs repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.inputs.outputs.target_branch }}
          fetch-depth: 0

      - name: Set up Python
        uses: ./.github/actions/setup-python-jobs
        with:
          python-version: "3.14"

      - name: Update contracts dependency manifests
        shell: bash
        run: |
          set -euo pipefail
          python scripts/workflows/pin_contracts_version.py --contracts-version "${{ steps.inputs.outputs.contracts_version }}"

      - name: Verify dependency contract tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pytest tests/test_multirepo_dependency_contract.py -q

      - name: Commit pinned contracts version
        env:
          CONTRACTS_VERSION: ${{ steps.inputs.outputs.contracts_version }}
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- pyproject.toml requirements.txt requirements.lock.txt; then
            echo "Contracts version already pinned to ${CONTRACTS_VERSION}."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml requirements.txt requirements.lock.txt
          git commit -m "chore: adopt contracts ${CONTRACTS_VERSION}"
          git push origin HEAD:${{ steps.inputs.outputs.target_branch }}
