baseline:
  branch: main

standards:
  format: []
  lint:
    - "python3 scripts/run_quality_gate.py lint-python"
  typecheck: []
  test_fast:
    - "python3 scripts/run_quality_gate.py test-fast"
  test_full:
    - "python3 scripts/run_quality_gate.py test-full"
  format_fix:
    - "python3 scripts/run_quality_gate.py format-python"
  lint_fix:
    - "python3 scripts/run_quality_gate.py lint-fix-python"

architecture:
  layers:
    - name: "core"
      path_glob: "core/**"
      allow_imports_from:
        - "core/**"
        - "monitoring/**"
        - "alpha_vantage/**"
        - "massive_provider/**"
        - "alpaca/**"
    - name: "monitoring"
      path_glob: "monitoring/**"
      allow_imports_from:
        - "core/**"
        - "monitoring/**"
    - name: "tasks"
      path_glob: "tasks/**"
      allow_imports_from:
        - "core/**"
        - "monitoring/**"
        - "alpha_vantage/**"
        - "massive_provider/**"
        - "alpaca/**"
        - "tasks/**"
  blessed_patterns:
    - "Idempotent storage reconciliation flows"
    - "Environment-driven runtime configuration"

dependencies:
  denylist:
    - "left-pad"
  allowlist: []
  lockfile_required: true

api:
  public_globs:
    - "core/control_plane_transport.py"
    - "core/*repository*.py"
    - "core/runtime_config.py"
    - "deploy/job_*.yaml"
    - "tasks/**"
  breaking_change_policy: "strict"

thresholds:
  drift_score_fail: 35
  category_weights:
    security: 40
    api: 35
    architecture: 25
    behavioral: 25
    dependency: 20
    test: 25
    performance: 15
    style: 5
    docs: 3
    config_infra: 0

auto_remediate:
  enabled: false
  max_files_changed: 50
  safe_directories:
    - "alpaca/**"
    - "alpha_vantage/**"
    - "core/**"
    - "deploy/**"
    - "docs/**"
    - "massive_provider/**"
    - "monitoring/**"
    - "scripts/**"
    - "tasks/**"
    - "tests/**"
    - ".github/workflows/**"
  commands:
    - "python3 -m ruff format ."
    - "python3 -m ruff check --fix ."

risk_controls:
  protected_globs:
    - "deploy/sql/postgres/migrations/**"
    - "infra/**"
    - ".github/workflows/deploy-prod.yml"
    - ".github/workflows/trigger-jobs.yml"
  require_tests_passing_before_automerge: true

reporting:
  markdown_path: "artifacts/drift_report.md"
  json_path: "artifacts/drift_report.json"
  patch_path: "artifacts/drift_remediation.patch"

detection:
  lookback_days: 7
  exclude_globs:
    - "artifacts/**"
  speculative_safeguards:
    enabled: true
    patterns:
      - '\?.*:\s*(?:None|null|False)\b'
      - '\|\|\s*(?:null|undefined)\b'
      - '\?\?\s*(?:null|undefined)\b'
      - '\breturn\s+(?:None|null|False)\b'
      - '\?.*:\s*[''"](?:N/?A|unknown|no data|no-data|unavailable|not available)[''"]'
      - '\|\|\s*[''"](?:N/?A|unknown|no data|no-data|unavailable|not available)[''"]'
      - '\?\?\s*[''"](?:N/?A|unknown|no data|no-data|unavailable|not available)[''"]'
      - '\breturn\s+[''"](?:N/?A|unknown|no data|no-data|unavailable|not available)[''"]'
